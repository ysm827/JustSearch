name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Syntax check
        run: |
          python -m py_compile backend/app/main.py
          python -m py_compile backend/app/workflow.py
          python -m py_compile backend/app/llm_client.py
          python -m py_compile backend/app/page_crawler.py
          python -m py_compile backend/app/database.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt pytest
      - name: Run tests
        run: python -m pytest tests/ -v

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12"
          cache: "npm"
      - name: Install frontend test deps
        run: npm ci
      - name: Run frontend tests
        run: npm run test:frontend

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t justsearch:ci .
